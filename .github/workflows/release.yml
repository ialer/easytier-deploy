name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact: et-deploy-linux-x64
          - os: ubuntu-latest
            arch: aarch64
            artifact: et-deploy-linux-arm64
          - os: macos-latest
            arch: x86_64
            artifact: et-deploy-macos-x64
          - os: macos-latest
            arch: arm64
            artifact: et-deploy-macos-arm64
          - os: windows-latest
            arch: x86_64
            artifact: et-deploy-windows-x64.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 build.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/et-deploy*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
